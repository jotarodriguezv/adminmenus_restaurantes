<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin · Menús</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --panel: #14141f;
  --card: #1c1c2e;
  --border: #252538;
  --border2: #303048;
  --accent: #cdfefe;
  --accent-dim: rgba(205,254,254,0.12);
  --accent-glow: rgba(205,254,254,0.25);
  --danger: #ff4757;
  --danger-dim: rgba(255,71,87,0.12);
  --success: #2ed573;
  --success-dim: rgba(46,213,115,0.12);
  --warn: #ffa502;
  --warn-dim: rgba(255,165,2,0.12);
  --text: #e8e8f0;
  --text-muted: #6b6b8a;
  --text-dim: #3a3a55;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 8px;
  --r-lg: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── UTILIDADES ── */
.hidden { display: none !important; }
.mono { font-family: var(--mono); }

/* ── PANTALLA LOGIN ── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(205,254,254,0.06) 0%, transparent 70%),
    var(--bg);
}

.login-box {
  width: 100%;
  max-width: 400px;
}

.login-brand {
  text-align: center;
  margin-bottom: 40px;
}
.login-brand-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.login-brand-name {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  text-shadow: 0 0 20px var(--accent-glow);
}

.login-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 32px;
}

.login-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  font-family: var(--mono);
}

.resto-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 24px;
}

.resto-btn {
  padding: 14px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
}
.resto-btn:hover { border-color: var(--border2); color: var(--text); }
.resto-btn.selected {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
  box-shadow: 0 0 12px var(--accent-glow);
}
.resto-btn.admin-btn {
  grid-column: 1 / -1;
  border-style: dashed;
}
.resto-btn.admin-btn.selected {
  border-color: var(--warn);
  color: var(--warn);
  background: var(--warn-dim);
  box-shadow: none;
}

.pin-wrap {
  position: relative;
  margin-bottom: 20px;
}
.pin-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 20px;
  letter-spacing: 8px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.pin-input:focus { border-color: var(--accent); }
.pin-input.error { border-color: var(--danger); animation: shake 0.3s; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #080810;
  border: none;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s, box-shadow 0.2s;
}
.btn-primary:hover { opacity: 0.9; box-shadow: 0 0 16px var(--accent-glow); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.login-error {
  text-align: center;
  font-size: 12px;
  color: var(--danger);
  margin-top: 12px;
  font-family: var(--mono);
  min-height: 18px;
}

/* ── LAYOUT PRINCIPAL ── */
#appScreen { display: none; min-height: 100vh; }

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,16,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  gap: 12px;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-badge {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--accent);
  color: var(--accent);
  white-space: nowrap;
}
.topbar-badge.admin {
  border-color: var(--warn);
  color: var(--warn);
}

.topbar-resto {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-sm {
  padding: 7px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.btn-sm:hover { border-color: var(--border2); color: var(--text); }
.btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  background: var(--surface);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 14px 20px;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── CONTENIDO ── */
.content { padding: 24px 20px 80px; max-width: 1000px; margin: 0 auto; }

/* ── SECCIÓN PROMO ── */
.promo-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
  margin-bottom: 24px;
}
.section-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.promo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.promo-status {
  display: flex;
  align-items: center;
  gap: 10px;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.3s;
}
.status-dot.on { background: var(--success); box-shadow: 0 0 8px var(--success); }
.status-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
}

/* Toggle switch */
.toggle-wrap { display: flex; align-items: center; gap: 10px; }
.toggle {
  position: relative;
  width: 44px; height: 24px;
  cursor: pointer;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: 0.25s;
}
.toggle-slider:before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: var(--text-muted);
  border-radius: 50%;
  transition: 0.25s;
}
.toggle input:checked + .toggle-slider { background: var(--success-dim); border-color: var(--success); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: var(--success); }
.toggle-label { font-size: 13px; color: var(--text-muted); }

.promo-img-preview {
  width: 80px; height: 80px;
  object-fit: cover;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
}

.upload-zone {
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 16px;
}
.upload-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
.upload-zone input { display: none; }
.upload-zone-text { font-size: 12px; color: var(--text-muted); }
.upload-zone-text span { color: var(--accent); }

/* ── FILTROS CATEGORÍAS ── */
.cat-filter {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
  margin-bottom: 16px;
}
.cat-filter::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.cat-chip:hover { border-color: var(--border2); color: var(--text); }
.cat-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ── TABLA PRODUCTOS ── */
.products-table {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}

.table-header {
  display: grid;
  grid-template-columns: 60px 1fr 110px 100px 80px 80px;
  gap: 0;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}
.th {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.product-row {
  display: grid;
  grid-template-columns: 60px 1fr 110px 100px 80px 80px;
  gap: 0;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  transition: background 0.15s;
}
.product-row:last-child { border-bottom: none; }
.product-row:hover { background: rgba(255,255,255,0.02); }
.product-row.unavailable { opacity: 0.45; }

.prod-img {
  width: 40px; height: 40px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
}
.prod-img-placeholder {
  width: 40px; height: 40px;
  border-radius: 6px;
  border: 1px dashed var(--border2);
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: border-color 0.2s;
}
.prod-img-placeholder:hover { border-color: var(--accent); }

.prod-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  padding-right: 12px;
  line-height: 1.3;
}
.prod-cat {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
}

.price-input {
  width: 100%;
  padding: 6px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.price-input:focus { border-color: var(--accent); }
.price-input.saved { border-color: var(--success); }

.avail-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-edit {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.btn-edit:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ── MODAL EDICIÓN ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.22s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }

.modal-box {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  width: 100%;
  max-width: 520px;
  max-height: 88vh;
  overflow-y: auto;
  transform: translateY(12px);
  transition: transform 0.22s;
}
.modal-bg.open .modal-box { transform: translateY(0); }

.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--panel);
  z-index: 1;
}
.modal-title {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
}
.modal-close {
  width: 30px; height: 30px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
}
.modal-close:hover { border-color: var(--danger); color: var(--danger); }

.modal-body { padding: 24px; }

.form-group { margin-bottom: 18px; }
.form-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: block;
}
.form-input, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* Preview de imagen en modal */
.img-edit-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  background: var(--card);
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
  margin-bottom: 8px;
}
.img-edit-wrap:hover { border-color: var(--accent); }
.img-edit-preview {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.img-edit-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.2s;
}
.img-edit-wrap:hover .img-edit-overlay { opacity: 1; }
.img-edit-overlay span { font-size: 11px; color: var(--accent); letter-spacing: 1px; font-family: var(--mono); text-transform: uppercase; }

.modal-foot {
  display: flex;
  gap: 10px;
  padding: 16px 24px 24px;
}
.btn-save {
  flex: 1;
  padding: 12px;
  background: var(--accent);
  color: #080810;
  border: none;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-save:hover { opacity: 0.88; }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-cancel {
  padding: 12px 20px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  z-index: 900;
  transform: translateY(10px);
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--success-dim); border: 1px solid var(--success); color: var(--success); }
.toast.error   { background: var(--danger-dim);  border: 1px solid var(--danger);  color: var(--danger); }
.toast.info    { background: var(--accent-dim);  border: 1px solid var(--accent);  color: var(--accent); }

/* ── LOADING SPINNER ── */
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ESTADO VACÍO ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 1px;
}

/* ── MOBILE ── */
@media (max-width: 700px) {
  .table-header { grid-template-columns: 48px 1fr 90px 70px; }
  .table-header .th:nth-child(5),
  .table-header .th:nth-child(6) { display: none; }
  .product-row { grid-template-columns: 48px 1fr 90px 70px; }
  .product-row > *:nth-child(5) { display: none; }
  .product-row > *:nth-child(6) { display: none; }
  .content { padding: 16px 12px 80px; }
  .topbar { padding: 0 12px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ── PANTALLA LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-brand-title">Sistema de Gestión</div>
      <div class="login-brand-name">MENÚS DIGITALES</div>
    </div>
    <div class="login-card">
      <div class="login-label">Selecciona restaurante</div>
      <div class="resto-grid" id="restoGrid">
        <!-- se llena dinámicamente -->
        <button class="resto-btn admin-btn" data-slug="__admin__" onclick="selectResto(this)">
          ⚙ Superadmin
        </button>
      </div>
      <div class="login-label">PIN de acceso</div>
      <div class="pin-wrap">
        <input type="password" class="pin-input mono" id="pinInput"
               maxlength="8" placeholder="····"
               oninput="clearPinError()"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()">INGRESAR</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- ── APP PRINCIPAL ── -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-badge" id="topbarBadge">ADMIN</div>
      <div class="topbar-resto" id="topbarResto">—</div>
    </div>
    <div class="topbar-right">
      <button class="btn-sm" id="btnSwitchResto" onclick="switchResto()">Cambiar</button>
      <button class="btn-sm danger" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('productos', this)">Productos</button>

<div class="modal-bg" id="editModal" onclick="handleModalBg(event)">

            Sin imagen · haz clic para subir

        <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="handleProductImgUpload(this)">

      </div>

        <label class="form-label">Nombre</label>
        <input type="text" class="form-input" id="editNombre">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Precio (texto)</label>
          <input type="text" class="form-input" id="editPrecio" placeholder="$ 22.000">
        </div>
        <div class="form-group">
          <label class="form-label">Precio numérico</label>
          <input type="number" class="form-input" id="editPrecioNum" placeholder="22000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <textarea class="form-textarea" id="editDesc"></textarea>
      </div>

        <label class="form-label">Descripción avanzada <span style="color:var(--text-dim)">(opcional)</span></label>
        <input type="text" class="form-input" id="editDescAvanzada" placeholder="Ej: Contiene gluten · Sin lactosa">
      </div>
      <div class="form-group">
        <label class="form-label">Disponible</label>
        <label class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="editDisponible">

      <button class="btn-save" id="btnSave" onclick="saveProduct()">Guardar cambios</button>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://tllpmdhkdlqoqpnqmuwn.supabase.co';
const ANON_KEY     = 'sb_publishable_PqQsGWYjDAu8oq9ABB1hnQ_658qW8RB';

// SERVICE ROLE KEY — necesaria para escritura (bypassa RLS)
// ⚠ IMPORTANTE: en producción mueve esto a una variable de entorno
// o a un backend proxy. Para un panel privado en tu servidor es aceptable.
const SERVICE_KEY  = 'REEMPLAZA_CON_TU_SERVICE_ROLE_KEY';

// PINes de acceso — cámbialos antes de desplegar
const PINS = {
  '__admin__': '0000',    // superadmin: acceso a todos los restaurantes
  'bonzas':    '1111',    // pin del cliente Bonzas
  'malparados':'2222',    // pin del cliente Malparados
};

// URL base de tu servidor de imágenes Docker
// Ej: 'https://imgs.verificame.click'
const IMG_SERVER = 'REEMPLAZA_CON_URL_DE_TU_SERVIDOR_IMGS';

// ═══════════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════════
let state = {
  rol: null,            // 'admin' | 'cliente'
  restauranteSlug: null,
  restaurante: null,    // objeto completo de la BD
  restaurantes: [],     // todos (solo admin)
  categorias: [],
  productos: [],
  catFiltro: 'all',
  editingProduct: null,
  pendingImgUrl: null,  // URL de img subida pendiente de guardar
};

// ═══════════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════════
async function sbRead(tabla, params = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${params}`, {
    headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
  });
  if (!r.ok) throw new Error(`Error leyendo ${tabla}`);
  return r.json();
}

async function sbWrite(method, tabla, params = '', body = null) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${params}`, {
    method,
    headers: {
      'apikey': SERVICE_KEY,
      'Authorization': `Bearer ${SERVICE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: body ? JSON.stringify(body) : null
  });
  if (!r.ok) {
    const err = await r.text();
    throw new Error(err);
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════
async function loadRestos() {
  try {
    const restos = await sbRead('restaurantes', 'select=id,nombre,slug&order=nombre.asc');
    state.restaurantes = restos;
    const grid = document.getElementById('restoGrid');
    // insertar antes del botón admin
    const adminBtn = grid.querySelector('.admin-btn');
    restos.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'resto-btn';
      btn.dataset.slug = r.slug;
      btn.textContent = r.nombre;
      btn.onclick = () => selectResto(btn);
      grid.insertBefore(btn, adminBtn);
    });
  } catch(e) { console.warn('No se pudo cargar restaurantes:', e); }
}

let selectedSlug = null;
function selectResto(btn) {
  document.querySelectorAll('.resto-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedSlug = btn.dataset.slug;
  document.getElementById('pinInput').focus();
}

function clearPinError() {
  document.getElementById('loginError').textContent = '';
  document.getElementById('pinInput').classList.remove('error');
}

function doLogin() {
  if (!selectedSlug) {
    document.getElementById('loginError').textContent = 'Selecciona un restaurante';
    return;
  }
  const pin = document.getElementById('pinInput').value;
  const correctPin = PINS[selectedSlug];
  if (!correctPin || pin !== correctPin) {
    document.getElementById('pinInput').classList.add('error');
    document.getElementById('loginError').textContent = 'PIN incorrecto';
    document.getElementById('pinInput').value = '';
    return;
  }
  // Login exitoso
  state.rol = selectedSlug === '__admin__' ? 'admin' : 'cliente';
  state.restauranteSlug = selectedSlug;
  enterApp();
}

function logout() {
  state = { restaurantes: state.restaurantes, productos: [], categorias: [], catFiltro: 'all', editingProduct: null, pendingImgUrl: null };
  selectedSlug = null;
  document.getElementById('pinInput').value = '';
  document.querySelectorAll('.resto-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('loginError').textContent = '';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function switchResto() {
  if (state.rol !== 'admin') return;
  logout();
}

// ═══════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════
async function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  // Topbar
  const badge = document.getElementById('topbarBadge');
  badge.textContent = state.rol === 'admin' ? 'SUPERADMIN' : 'EDITOR';
  badge.className = 'topbar-badge' + (state.rol === 'admin' ? ' admin' : '');
  document.getElementById('btnSwitchResto').style.display = state.rol === 'admin' ? 'block' : 'none';

  await loadRestauranteData();
  switchTab('productos', document.querySelector('.tab-btn'));
}

async function loadRestauranteData() {
  try {
    if (state.restauranteSlug === '__admin__') {
      // Admin ve el primer restaurante por defecto — puedes expandir esto
      state.restaurante = state.restaurantes[0];
      state.restauranteSlug = state.restaurante.slug;
    } else {
      const data = await sbRead('restaurantes', `slug=eq.${state.restauranteSlug}&select=*`);
      state.restaurante = data[0];
    }

    document.getElementById('topbarResto').textContent = state.restaurante.nombre.toUpperCase();
    document.documentElement.style.setProperty('--accent', state.restaurante.color_primario || '#cdfefe');

    state.categorias = await sbRead('categorias',
      `restaurante_id=eq.${state.restaurante.id}&select=*&order=orden.asc`);

    state.productos = await sbRead('productos',
      `restaurante_id=eq.${state.restaurante.id}&select=*&order=precio_numerico.asc`);

    renderCatFilter();
    renderProducts();
    renderPromo();
  } catch(e) {
    showToast('Error cargando datos', 'error');
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabProductos').classList.toggle('hidden', tab !== 'productos');
  document.getElementById('tabPromo').classList.toggle('hidden', tab !== 'promo');
}

// ═══════════════════════════════════════════════════════════════
// FILTRO CATEGORÍAS
// ═══════════════════════════════════════════════════════════════
function renderCatFilter() {
  const wrap = document.getElementById('catFilter');
  wrap.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'cat-chip active';
  all.textContent = 'Todos';
  all.onclick = () => setFilter('all', all);
  wrap.appendChild(all);
  state.categorias.forEach(cat => {
    const tieneProductos = state.productos.some(p => p.categoria_id === cat.id);
    if (!tieneProductos) return;
    const chip = document.createElement('button');
    chip.className = 'cat-chip';
    chip.textContent = `${cat.emoji || ''} ${cat.nombre}`.trim();
    chip.onclick = () => setFilter(cat.id, chip);
    wrap.appendChild(chip);
  });
}

function setFilter(catId, btn) {
  state.catFiltro = catId;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

// ═══════════════════════════════════════════════════════════════
// LISTA PRODUCTOS
// ═══════════════════════════════════════════════════════════════
function renderProducts() {
  const list = document.getElementById('productList');
  const prods = state.catFiltro === 'all'
    ? state.productos
    : state.productos.filter(p => p.categoria_id === state.catFiltro);

  if (!prods.length) {
    list.innerHTML = '<div class="empty-state">Sin productos en esta categoría</div>';
    return;
  }

  list.innerHTML = '';
  prods.forEach(p => {
    const cat = state.categorias.find(c => c.id === p.categoria_id);
    const row = document.createElement('div');
    row.className = 'product-row' + (p.disponible ? '' : ' unavailable');
    row.id = 'row-' + p.id;

    const imgEl = p.imagen_url
      ? `<img class="prod-img" src="${p.imagen_url}" alt="${p.nombre}" onclick="openEditModal('${p.id}')" onerror="this.outerHTML='<div class=\'prod-img-placeholder\' onclick=\'openEditModal(\"${p.id}\")\'>+</div>'">`
      : `<div class="prod-img-placeholder" onclick="openEditModal('${p.id}')">+</div>`;

    row.innerHTML = `
      ${imgEl}
      <div>
        <div class="prod-name">${p.nombre}</div>
        <div class="prod-cat">${cat ? cat.nombre : ''}</div>
      </div>
      <div>
        <input class="price-input" id="price-${p.id}"
          value="${p.precio}" onblur="quickSavePrice('${p.id}', this)">
      </div>
      <div class="avail-toggle">
        <label class="toggle">
          <input type="checkbox" ${p.disponible ? 'checked' : ''}
            onchange="quickToggleDisponible('${p.id}', this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div></div>
      <div>
        <button class="btn-edit" onclick="openEditModal('${p.id}')">Editar</button>
      </div>
    `;
    list.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════════
// ACCIONES RÁPIDAS (inline)
// ═══════════════════════════════════════════════════════════════
async function quickSavePrice(id, input) {
  const prod = state.productos.find(p => p.id === id);
  if (!prod || input.value === prod.precio) return;
  try {
    await sbWrite('PATCH', 'productos', `id=eq.${id}`,
      { precio: input.value, precio_numerico: parseFloat(input.value.replace(/[^0-9.]/g,'')) || prod.precio_numerico }
    );
    prod.precio = input.value;
    input.classList.add('saved');
    setTimeout(() => input.classList.remove('saved'), 1500);
    showToast('Precio actualizado', 'success');
  } catch(e) {
    showToast('Error al guardar precio', 'error');
    input.value = prod.precio;
  }
}

async function quickToggleDisponible(id, disponible) {
  try {
    await sbWrite('PATCH', 'productos', `id=eq.${id}`, { disponible });
    const prod = state.productos.find(p => p.id === id);
    if (prod) prod.disponible = disponible;
    const row = document.getElementById('row-' + id);
    if (row) row.classList.toggle('unavailable', !disponible);
    showToast(disponible ? 'Producto activado' : 'Producto desactivado', 'success');
  } catch(e) {
    showToast('Error al actualizar disponibilidad', 'error');
  }
}

// ═══════════════════════════════════════════════════════════════
// MODAL EDICIÓN COMPLETA
// ═══════════════════════════════════════════════════════════════
function openEditModal(id) {
  const p = state.productos.find(pr => pr.id === id);
  if (!p) return;
  state.editingProduct = p;
  state.pendingImgUrl  = null;

  document.getElementById('editProductId').value    = p.id;
  document.getElementById('editNombre').value       = p.nombre || '';
  document.getElementById('editPrecio').value       = p.precio || '';
  document.getElementById('editPrecioNum').value    = p.precio_numerico || '';
  document.getElementById('editDesc').value         = p.descripcion || '';
  document.getElementById('editDescAvanzada').value = p.descripcion_avanzada || '';
  document.getElementById('editDisponible').checked = p.disponible;
  document.getElementById('editDisponibleLabel').textContent = p.disponible ? 'Disponible' : 'No disponible';
  document.getElementById('editDisponible').onchange = function() {
    document.getElementById('editDisponibleLabel').textContent = this.checked ? 'Disponible' : 'No disponible';
  };

  // Imagen
  const preview = document.getElementById('imgEditPreview');
  const placeholder = document.getElementById('imgEditPlaceholder');
  if (p.imagen_url) {
    preview.src = p.imagen_url;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    preview.style.display = 'none';
    placeholder.style.display = 'flex';
  }
  document.getElementById('imgUploadStatus').textContent = '';
  document.getElementById('imgFileInput').value = '';

  document.getElementById('editModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  document.body.style.overflow = '';
  state.editingProduct = null;
  state.pendingImgUrl  = null;
}

function handleModalBg(e) {
  if (e.target.id === 'editModal') closeEditModal();
}

function triggerImgUpload() {
  document.getElementById('imgFileInput').click();
}

async function handleProductImgUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('imgUploadStatus');
  status.textContent = 'Subiendo imagen...';

  try {
    const compressed = await compressImage(file, 800, 0.82);
    const url = await uploadToServer(compressed, 'productos');
    state.pendingImgUrl = url;

    const preview = document.getElementById('imgEditPreview');
    preview.src = url;
    preview.style.display = 'block';
    document.getElementById('imgEditPlaceholder').style.display = 'none';
    status.textContent = '✓ Imagen lista para guardar';
    status.style.color = 'var(--success)';
  } catch(e) {
    status.textContent = 'Error al subir imagen';
    status.style.color = 'var(--danger)';
  }
}

async function saveProduct() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  const id = document.getElementById('editProductId').value;
  const body = {
    nombre:               document.getElementById('editNombre').value.trim(),
    precio:               document.getElementById('editPrecio').value.trim(),
    precio_numerico:      parseFloat(document.getElementById('editPrecioNum').value) || 0,
    descripcion:          document.getElementById('editDesc').value.trim() || null,
    descripcion_avanzada: document.getElementById('editDescAvanzada').value.trim() || null,
    disponible:           document.getElementById('editDisponible').checked,
  };
  if (state.pendingImgUrl) body.imagen_url = state.pendingImgUrl;

  try {
    await sbWrite('PATCH', 'productos', `id=eq.${id}`, body);
    // Actualizar estado local
    const idx = state.productos.findIndex(p => p.id === id);
    if (idx !== -1) state.productos[idx] = { ...state.productos[idx], ...body };
    renderProducts();
    closeEditModal();
    showToast('Producto guardado', 'success');
  } catch(e) {
    showToast('Error al guardar', 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar cambios';
  }
}

// ═══════════════════════════════════════════════════════════════
// PROMO
// ═══════════════════════════════════════════════════════════════
function renderPromo() {
  const r = state.restaurante;
  const toggle = document.getElementById('promoToggle');
  const dot    = document.getElementById('promoDot');
  const txt    = document.getElementById('promoStatusText');
  const preview = document.getElementById('promoImgPreview');
  const none    = document.getElementById('promoImgNone');

  toggle.checked = r.promo_activa;
  dot.className  = 'status-dot' + (r.promo_activa ? ' on' : '');
  txt.textContent = r.promo_activa ? 'Activa' : 'Inactiva';

  if (r.promo_imagen_url) {
    preview.src = r.promo_imagen_url;
    preview.style.display = 'block';
    none.style.display = 'none';
  } else {
    preview.style.display = 'none';
    none.style.display = 'block';
  }
}

async function togglePromo() {
  const activa = document.getElementById('promoToggle').checked;
  try {
    await sbWrite('PATCH', 'restaurantes', `id=eq.${state.restaurante.id}`, { promo_activa: activa });
    state.restaurante.promo_activa = activa;
    renderPromo();
    showToast(activa ? 'Promo activada' : 'Promo desactivada', 'success');
  } catch(e) {
    showToast('Error al cambiar promo', 'error');
    document.getElementById('promoToggle').checked = !activa;
  }
}

async function handlePromoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('promoUploadStatus');
  status.textContent = 'Subiendo...';
  status.style.color = 'var(--text-muted)';

  try {
    const compressed = await compressImage(file, 1200, 0.85);
    const url = await uploadToServer(compressed, 'promos');
    await sbWrite('PATCH', 'restaurantes', `id=eq.${state.restaurante.id}`, { promo_imagen_url: url });
    state.restaurante.promo_imagen_url = url;
    renderPromo();
    status.textContent = '✓ Imagen de promo actualizada';
    status.style.color = 'var(--success)';
    showToast('Imagen de promo guardada', 'success');
  } catch(e) {
    status.textContent = 'Error al subir imagen';
    status.style.color = 'var(--danger)';
    showToast('Error al subir imagen', 'error');
  }
}

// ═══════════════════════════════════════════════════════════════
// IMÁGENES — compresión + upload al servidor
// ═══════════════════════════════════════════════════════════════
function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToServer(blob, folder = 'productos') {
  if (!IMG_SERVER || IMG_SERVER.startsWith('REEMPLAZA')) {
    throw new Error('IMG_SERVER no configurado');
  }
  const formData = new FormData();
  formData.append('file', blob, `img_${Date.now()}.jpg`);
  formData.append('folder', folder);

  const res = await fetch(`${IMG_SERVER}/upload`, {
    method: 'POST',
    body: formData
  });
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  return data.url; // el servidor devuelve { url: 'https://...' }
}

// TOAST
// ═══════════════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
